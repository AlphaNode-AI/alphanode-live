<!DOCTYPE html>
<html>

<head>

<title>AlphaNode PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  background:#020509;
  color:#00ffaa;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#071018;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,170,0.2);
}

.title{
  font-size:30px;
  font-weight:bold;
}

.price{
  font-size:45px;
  margin-top:20px;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<div class="title">
AlphaNode PRO
</div>

<div style="margin-top:15px;">
LIVE BTC PRICE
</div>

<div class="price" id="price">
Loading...
</div>

</div>

<script>

async function loadPrice(){

  const response = await fetch('https://your-backend.up.railway.app');

  const data = await response.json();

  document.getElementById('price').innerHTML =
    '$' + data.btc_price;

}

loadPrice();

setInterval(loadPrice, 5000);

</script>

</body>

</html>
