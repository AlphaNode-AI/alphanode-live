<!DOCTYPE html>
<html>

<head>

<title>AlphaNode PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  <div class="card">
  <div class="title">AlphaNode PRO</div>

  <div>BTC/USDT LIVE</div>

  <div class="price" id="price">Loading...</div>

  <div id="change" style="margin-top:10px;color:#aaa;"></div>

  <div style="margin-top:20px;">
    <iframe
      src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=15&theme=dark"
      width="100%"
      height="300"
      frameborder="0">
    </iframe>
  </div>
</div>
}

.card{
  background:#071018;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,170,0.2);
}

.title{
  font-size:30px;
  font-weight:bold;
}

.price{
  font-size:45px;
  margin-top:20px;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<div class="title">
AlphaNode PRO
</div>

<div style="margin-top:15px;">
LIVE BTC PRICE
</div>

<div class="price" id="price">
Loading...
</div>

</div>

<script>

let lastPrice = null;

async function loadPrice(){

  const res = await fetch('YOUR_RAILWAY_URL');
  const data = await res.json();

  const price = data.btc_price;

  document.getElementById('price').innerHTML = '$' + price;

  if(lastPrice){

    let diff = price - lastPrice;

    document.getElementById('change').innerHTML =
      diff > 0 ? '📈 +'+diff : '📉 '+diff;

  }

  lastPrice = price;
}

loadPrice();
setInterval(loadPrice, 3000);

</script>

</body>

</html>
