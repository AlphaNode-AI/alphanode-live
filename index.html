<!DOCTYPE html>
<html>
<head>
  <title>AlphaNode PRO</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body{
      margin:0;
      background:#020509;
      color:#00ffaa;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      flex-direction:column;
    }

    .card{
      background:#071018;
      padding:30px;
      border-radius:20px;
      width:90%;
      max-width:400px;
      text-align:center;
      box-shadow:0 0 30px rgba(0,255,170,0.2);
    }

    .price{
      font-size:42px;
      font-weight:bold;
      margin-top:20px;
    }

    .title{
      font-size:28px;
      font-weight:bold;
    }

  </style>

</head>

<body>

<div class="card">

<div class="title">
AlphaNode PRO
</div>

<div style="margin-top:15px;">
BTC LIVE PRICE
</div>

<div class="price" id="price">
Loading...
</div>

</div>

<script>

async function loadPrice(){

  const response = await fetch('https://alphanode-live.up.railway.app');

  const data = await response.json();

  document.getElementById('price').innerHTML =
    '$' + data.btc_price;

}

loadPrice();

setInterval(loadPrice, 5000);

</script>

</body>
</html>
